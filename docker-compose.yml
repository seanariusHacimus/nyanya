services:
  postgres:
    image: postgres:17-alpine
    container_name: nyanya-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nyanya
      POSTGRES_PASSWORD: nyanya_dev
      POSTGRES_DB: nyanya
    ports:
      - "5434:5432"
    volumes:
      - nyanya_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nyanya -d nyanya"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  nyanya_pgdata:
